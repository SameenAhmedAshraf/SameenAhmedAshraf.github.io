<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Park Register">
<link rel="manifest" href="manifest.json">
<title>Park Register</title>
<style>
:root {
  --blue: #007AFF; --red: #FF3B30; --green: #34C759; --orange: #FF9500;
  --bg: #F2F2F7; --card: #FFFFFF; --label: #000; --secondary: rgba(60,60,67,.6);
  --tertiary: rgba(60,60,67,.3); --sep: rgba(60,60,67,.29);
  --tab-bg: rgba(249,249,249,.94);
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#000; --card:#1C1C1E; --label:#fff;
    --secondary:rgba(235,235,245,.6); --tertiary:rgba(235,235,245,.3);
    --sep:rgba(84,84,88,.65); --tab-bg:rgba(28,28,30,.94);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--label)}
#app{display:flex;flex-direction:column;height:100%}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sb) + 56px)}

/* Tab bar */
.tabs{background:var(--tab-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:.5px solid var(--sep);padding:6px 0 calc(var(--sb) + 2px);display:flex;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--secondary);padding:2px 0;font-family:inherit}
.tab.on{color:var(--blue)}
.tab svg{width:24px;height:24px}
.tab span{font-size:10px;font-weight:500}

/* Nav bar */
.nav{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--st) + 16px) 16px 8px}
.nav-title{font-size:34px;font-weight:700}
.nav-btn{background:none;border:none;color:var(--blue);font-size:17px;padding:8px;cursor:pointer;font-family:inherit;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.nav-sub{font-size:15px;color:var(--secondary);padding:0 16px 12px}

/* Cards & rows */
.sec{margin:20px 0 0}
.sec-hdr{font-size:13px;color:var(--secondary);text-transform:uppercase;letter-spacing:.04em;padding:0 16px 6px}
.card{background:var(--card);border-radius:12px;margin:0 16px;overflow:hidden}
.row{display:flex;align-items:center;padding:12px 16px;min-height:44px;border-bottom:.5px solid var(--sep);background:none;width:100%;text-align:left;color:var(--label);cursor:pointer;font-family:inherit}
.row:last-child{border-bottom:none}
.row.sel{background:rgba(0,122,255,.08)}
.row-body{flex:1;min-width:0}
.row-title{font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:14px;color:var(--secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-cap{font-size:13px;color:var(--tertiary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chk{color:var(--blue);margin-right:10px;flex-shrink:0}
.chv{color:var(--tertiary);flex-shrink:0;margin-left:8px}
.badge{display:inline-block;background:var(--blue);color:#fff;border-radius:8px;font-size:11px;font-weight:600;padding:1px 6px;margin-left:5px}

/* Buttons */
.btn{display:block;width:calc(100% - 32px);margin:16px;padding:15px;border-radius:12px;border:none;font-size:17px;font-weight:600;cursor:pointer;background:var(--blue);color:#fff;font-family:inherit}
.btn:disabled{opacity:.35}
.btn.red{background:var(--red)}
.btn.ghost{background:var(--card);color:var(--blue);border:.5px solid var(--sep)}

/* Form */
.ff{display:flex;align-items:center;padding:11px 16px;border-bottom:.5px solid var(--sep);min-height:44px;gap:8px}
.ff:last-child{border-bottom:none}
.ff label{font-size:17px;width:110px;flex-shrink:0;color:var(--label)}
.ff input,.ff select,.ff textarea{flex:1;font-size:17px;border:none;outline:none;background:transparent;color:var(--label);font-family:inherit;min-width:0}
.ff input::placeholder,.ff textarea::placeholder{color:var(--tertiary)}
.ff select{-webkit-appearance:none;appearance:none}
.ff.col{flex-direction:column;align-items:stretch}
.ff.col label{width:auto;margin-bottom:4px}
.ff.col input{font-size:15px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;animation:fi .2s ease}
.sheet{background:var(--bg);border-radius:16px 16px 0 0;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sb) + 8px);animation:su .28s ease}
.handle{width:36px;height:5px;background:var(--sep);border-radius:3px;margin:10px auto 0}
.mnav{display:flex;align-items:center;justify-content:space-between;padding:8px 8px 10px}
.mnav .ttl{font-size:17px;font-weight:600}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Fill guide */
.fg-field{display:flex;align-items:center;padding:12px 16px;border-bottom:.5px solid var(--sep);gap:10px}
.fg-field:last-child{border-bottom:none}
.fg-lbl{font-size:13px;color:var(--secondary);width:96px;flex-shrink:0}
.fg-val{flex:1;font-size:17px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:5px 11px;font-size:13px;font-weight:500;cursor:pointer;flex-shrink:0;font-family:inherit;transition:background .15s}
.copy.ok{background:var(--green)}

/* Info banner */
.info{margin:12px 16px;padding:12px;background:rgba(0,122,255,.1);border-radius:10px;font-size:14px;color:var(--secondary);line-height:1.5}

/* Empty */
.empty{text-align:center;padding:52px 16px;color:var(--secondary)}
.empty-ico{font-size:52px;margin-bottom:12px}
.empty h3{font-size:20px;font-weight:600;color:var(--label);margin-bottom:6px}

/* URL preview */
.url-chip{font-size:12px;color:var(--blue);padding:0 16px 8px;word-break:break-all}
.url-warn{color:var(--red)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  tab: 'reg',   // reg | people | complexes
  modal: null,  // null | 'person' | 'vehicle' | 'complex' | 'fill'
  sel: { cid: null, pid: null, vid: null },
  draft: {},
  draftVehicles: [],
  draftVeh: {},
  vehIdx: -1,   // -1 = new vehicle
};

let complexes = load('complexes') || [
  { id: uid(), name: 'Complex 1', addr: '', url: 'https://www.register2park.com/', code: '' },
  { id: uid(), name: 'Complex 2', addr: '', url: 'https://www.register2park.com/', code: '' },
  { id: uid(), name: 'Complex 3', addr: '', url: 'https://www.register2park.com/', code: '' },
];
let people = load('people') || [];

function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36) }
function save(){ ls('complexes',complexes); ls('people',people) }
function ls(k,v){ localStorage.setItem(k,JSON.stringify(v)) }
function load(k){ try{ return JSON.parse(localStorage.getItem(k)) }catch(e){ return null } }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function selC(){ return complexes.find(c=>c.id===S.sel.cid) }
function selP(){ return people.find(p=>p.id===S.sel.pid) }
function selV(){ const p=selP(); return p&&p.vehicles&&p.vehicles.find(v=>v.id===S.sel.vid) }

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  let html = `<div class="scr" id="scr">`;
  if(S.tab==='reg') html += viewReg();
  else if(S.tab==='people') html += viewPeople();
  else if(S.tab==='complexes') html += viewComplexes();
  html += `</div><div class="tabs">${renderTabs()}</div>`;
  if(S.modal==='person') html += modalPerson();
  else if(S.modal==='vehicle') html += modalVehicle();
  else if(S.modal==='complex') html += modalComplex();
  else if(S.modal==='fill') html += modalFill();
  document.getElementById('app').innerHTML = html;
}

function renderTabs(){
  const ts=[
    {id:'reg',lbl:'Register',ico:iCar()},
    {id:'people',lbl:'People',ico:iPeople()},
    {id:'complexes',lbl:'Complexes',ico:iBuilding()},
  ];
  return ts.map(t=>`<button class="tab ${S.tab===t.id?'on':''}" onclick="setTab('${t.id}')">${t.ico}<span>${t.lbl}</span></button>`).join('');
}

// ── Register view ─────────────────────────────────────────────────────────────
function viewReg(){
  const p = selP(), v = selV(), canGo = selC()&&p&&v;
  return `
  <div class="nav"><span class="nav-title">Register</span></div>
  <p class="nav-sub">Pick a complex and guest to register parking</p>

  <div class="sec"><div class="sec-hdr">Complex</div><div class="card">
    ${complexes.map(c=>`
      <button class="row ${S.sel.cid===c.id?'sel':''}" onclick="pickC('${c.id}')">
        ${S.sel.cid===c.id?`<span class="chk">${iCheck()}</span>`:''}
        <div class="row-body">
          <div class="row-title">${esc(c.name)}</div>
          ${c.addr?`<div class="row-sub">${esc(c.addr)}</div>`:''}
        </div>
      </button>`).join('')}
  </div></div>

  <div class="sec"><div class="sec-hdr">Person</div><div class="card">
    ${people.length===0?`<div style="padding:14px 16px;color:var(--secondary);font-size:15px">No people saved — add them in the People tab</div>`
    :people.map(p=>`
      <button class="row ${S.sel.pid===p.id?'sel':''}" onclick="pickP('${p.id}')">
        ${S.sel.pid===p.id?`<span class="chk">${iCheck()}</span>`:''}
        <div class="row-body">
          <div class="row-title">${esc(p.name)}</div>
          <div class="row-sub">Apt ${esc(p.apt)}${p.email?' · '+esc(p.email):''}</div>
        </div>
      </button>`).join('')}
  </div></div>

  ${p&&p.vehicles&&p.vehicles.length?`
  <div class="sec"><div class="sec-hdr">Vehicle</div><div class="card">
    ${p.vehicles.map(v=>`
      <button class="row ${S.sel.vid===v.id?'sel':''}" onclick="pickV('${v.id}')">
        ${S.sel.vid===v.id?`<span class="chk">${iCheck()}</span>`:''}
        <div class="row-body">
          <div class="row-title">${esc(v.year)} ${esc(v.make)} ${esc(v.model)}</div>
          <div class="row-sub">${esc(v.plate)} · ${esc(v.state)} · ${esc(v.color)}</div>
        </div>
      </button>`).join('')}
  </div></div>`:''
  }

  <button class="btn" ${canGo?'':'disabled'} onclick="openFill()" style="margin-top:24px">
    Open &amp; Fill Registration Form
  </button>`;
}

// ── People view ───────────────────────────────────────────────────────────────
function viewPeople(){
  return `
  <div class="nav">
    <span class="nav-title">People</span>
    <button class="nav-btn" onclick="addPerson()" title="Add">${iPlus()}</button>
  </div>
  ${people.length===0?`
  <div class="empty"><div class="empty-ico">👤</div><h3>No People Yet</h3><p>Tap + to add someone</p></div>
  `:`
  <div class="sec"><div class="card">
    ${people.map(p=>`
      <button class="row" onclick="editPerson('${p.id}')">
        <div class="row-body">
          <div class="row-title">${esc(p.name)}<span class="badge">${(p.vehicles||[]).length} car${(p.vehicles||[]).length!==1?'s':''}</span></div>
          <div class="row-sub">Apt ${esc(p.apt)}${p.phone?' · '+esc(p.phone):''}</div>
          ${p.vehicles&&p.vehicles.length?`<div class="row-cap">${p.vehicles.map(v=>`${v.year} ${v.make} ${v.model} — ${v.plate}`).join(', ')}</div>`:''}
        </div>
        <span class="chv">${iChev()}</span>
      </button>`).join('')}
  </div></div>`}`;
}

// ── Complexes view ────────────────────────────────────────────────────────────
function viewComplexes(){
  return `
  <div class="nav"><span class="nav-title">Complexes</span></div>
  <p class="nav-sub">Tap each complex to set its register2park.com URL</p>
  <div class="card" style="margin:0 16px">
    ${complexes.map(c=>{
      const configured = c.url && c.url !== 'https://www.register2park.com/';
      return `
      <button class="row" onclick="editComplex('${c.id}')">
        <div class="row-body">
          <div class="row-title">${esc(c.name)}</div>
          ${c.addr?`<div class="row-sub">${esc(c.addr)}</div>`:''}
          <div class="row-cap ${configured?'':'url-warn'}">${configured?esc(c.url):'⚠ URL not configured yet'}</div>
        </div>
        <span class="chv">${iChev()}</span>
      </button>`;
    }).join('')}
  </div>
  <div class="info">💡 Go to <strong>register2park.com</strong> in Safari, navigate to your complex's registration page, copy the URL from the address bar, and paste it here.</div>`;
}

// ── Fill Guide Modal ──────────────────────────────────────────────────────────
function modalFill(){
  const c=selC(), p=selP(), v=selV();
  const firstName=(p.name||'').split(' ')[0];
  const lastName=(p.name||'').split(' ').slice(1).join(' ');
  const url = c.url||'https://www.register2park.com/';
  const fields=[
    ['First Name', firstName],
    ['Last Name', lastName],
    ['Full Name', p.name],
    ['Apartment', p.apt],
    ['Email', p.email],
    ['Phone', p.phone],
    ['Car Make', v.make],
    ['Car Model', v.model],
    ['Year', v.year],
    ['Color', v.color],
    ['License Plate', v.plate],
    ['State', v.state],
    ['Property Code', c.code],
  ].filter(([,val])=>val);

  return `
  <div class="overlay" onclick="bgClose(event)">
    <div class="sheet">
      <div class="handle"></div>
      <div class="mnav">
        <button class="nav-btn" onclick="closeModal()">Done</button>
        <span class="ttl">Fill Guide</span>
        <a href="${esc(url)}" target="_blank" style="text-decoration:none">
          <button class="nav-btn" style="font-weight:600">Open Site</button>
        </a>
      </div>
      <div class="info" style="margin-top:0">
        Tap <strong>Open Site</strong> to open the form in a new tab. Tap <strong>Copy</strong> next to each field, then paste it into the form.
      </div>
      <div class="card" style="margin-bottom:16px">
        ${fields.map(([lbl,val],i)=>`
        <div class="fg-field">
          <div class="fg-lbl">${esc(lbl)}</div>
          <div class="fg-val">${esc(val)}</div>
          <button class="copy" id="cp${i}" onclick="doCopy(${JSON.stringify(esc(val))},'cp${i}')">Copy</button>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ── Person Modal ──────────────────────────────────────────────────────────────
function modalPerson(){
  const d=S.draft, isNew=!d.id, vs=S.draftVehicles||[];
  return `
  <div class="overlay">
    <div class="sheet">
      <div class="handle"></div>
      <div class="mnav">
        <button class="nav-btn" onclick="closeModal()">Cancel</button>
        <span class="ttl">${isNew?'New Person':'Edit Person'}</span>
        <button class="nav-btn" style="font-weight:600" onclick="savePerson()">Save</button>
      </div>
      <div class="sec-hdr">Info</div>
      <div class="card">
        <div class="ff"><label>Name</label><input placeholder="Full Name" value="${esc(d.name||'')}" oninput="S.draft.name=this.value"></div>
        <div class="ff"><label>Apartment</label><input placeholder="204" inputmode="numeric" value="${esc(d.apt||'')}" oninput="S.draft.apt=this.value"></div>
        <div class="ff"><label>Email</label><input type="email" placeholder="email@example.com" autocapitalize="none" value="${esc(d.email||'')}" oninput="S.draft.email=this.value"></div>
        <div class="ff"><label>Phone</label><input type="tel" placeholder="(555) 000-0000" value="${esc(d.phone||'')}" oninput="S.draft.phone=this.value"></div>
      </div>
      <div class="sec-hdr" style="margin-top:20px">Vehicles</div>
      <div class="card">
        ${vs.map((v,i)=>`
        <button class="row" onclick="editVeh(${i})">
          <div class="row-body">
            <div class="row-title">${esc(v.year)} ${esc(v.make)} ${esc(v.model)}</div>
            <div class="row-sub">${esc(v.color)} · ${esc(v.plate)} (${esc(v.state)})</div>
          </div>
          <span class="chv">${iChev()}</span>
        </button>`).join('')}
        <button class="row" style="color:var(--blue)" onclick="addVeh()">
          <div class="row-body"><div class="row-title">+ Add Vehicle</div></div>
        </button>
      </div>
      ${!isNew?`<button class="btn red" style="margin-top:24px" onclick="delPerson('${d.id}')">Delete Person</button>`:''}
      <div style="height:20px"></div>
    </div>
  </div>`;
}

// ── Vehicle Modal ─────────────────────────────────────────────────────────────
const STATES=['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC'];

function modalVehicle(){
  const v=S.draftVeh||{}, isNew=S.vehIdx===-1;
  return `
  <div class="overlay">
    <div class="sheet">
      <div class="handle"></div>
      <div class="mnav">
        <button class="nav-btn" onclick="cancelVeh()">Cancel</button>
        <span class="ttl">${isNew?'Add Vehicle':'Edit Vehicle'}</span>
        <button class="nav-btn" style="font-weight:600" onclick="saveVeh()">Save</button>
      </div>
      <div class="sec-hdr">Vehicle</div>
      <div class="card">
        <div class="ff"><label>Make</label><input placeholder="Toyota" value="${esc(v.make||'')}" oninput="S.draftVeh.make=this.value"></div>
        <div class="ff"><label>Model</label><input placeholder="Camry" value="${esc(v.model||'')}" oninput="S.draftVeh.model=this.value"></div>
        <div class="ff"><label>Year</label><input placeholder="2022" inputmode="numeric" value="${esc(v.year||'')}" oninput="S.draftVeh.year=this.value"></div>
        <div class="ff"><label>Color</label><input placeholder="Silver" value="${esc(v.color||'')}" oninput="S.draftVeh.color=this.value"></div>
      </div>
      <div class="sec-hdr" style="margin-top:20px">License Plate</div>
      <div class="card">
        <div class="ff"><label>Plate #</label><input placeholder="ABC1234" autocapitalize="characters" value="${esc(v.plate||'')}" oninput="S.draftVeh.plate=this.value.toUpperCase()"></div>
        <div class="ff"><label>State</label>
          <select onchange="S.draftVeh.state=this.value">
            ${STATES.map(s=>`<option value="${s}"${v.state===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      ${!isNew?`<button class="btn red" style="margin-top:24px" onclick="delVeh(${S.vehIdx})">Delete Vehicle</button>`:''}
      <div style="height:20px"></div>
    </div>
  </div>`;
}

// ── Complex Modal ─────────────────────────────────────────────────────────────
function modalComplex(){
  const d=S.draft;
  return `
  <div class="overlay">
    <div class="sheet">
      <div class="handle"></div>
      <div class="mnav">
        <button class="nav-btn" onclick="closeModal()">Cancel</button>
        <span class="ttl">Edit Complex</span>
        <button class="nav-btn" style="font-weight:600" onclick="saveComplex()">Save</button>
      </div>
      <div class="sec-hdr">Info</div>
      <div class="card">
        <div class="ff"><label>Name</label><input placeholder="Complex Name" value="${esc(d.name||'')}" oninput="S.draft.name=this.value"></div>
        <div class="ff"><label>Address</label><input placeholder="123 Main St" value="${esc(d.addr||'')}" oninput="S.draft.addr=this.value"></div>
      </div>
      <div class="sec-hdr" style="margin-top:20px">Register2Park</div>
      <div class="card">
        <div class="ff col">
          <label>Registration URL</label>
          <input type="url" autocapitalize="none" autocorrect="off" spellcheck="false"
            placeholder="https://www.register2park.com/..."
            value="${esc(d.url||'')}" oninput="S.draft.url=this.value">
        </div>
        <div class="ff"><label>Property Code</label><input placeholder="Optional" autocapitalize="none" value="${esc(d.code||'')}" oninput="S.draft.code=this.value"></div>
      </div>
      <div class="info">Open register2park.com in Safari → find your complex → navigate to its registration page → copy the URL from the address bar → paste above.</div>
    </div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function setTab(t){ S.tab=t; render() }
function pickC(id){ S.sel.cid=id; render() }
function pickP(id){ S.sel.pid=id; const p=people.find(x=>x.id===id); S.sel.vid=p&&p.vehicles&&p.vehicles.length?p.vehicles[0].id:null; render() }
function pickV(id){ S.sel.vid=id; render() }

function openFill(){ S.modal='fill'; render() }
function closeModal(){ S.modal=null; render() }
function bgClose(e){ if(e.target.classList.contains('overlay')) closeModal() }

function doCopy(val,btnId){
  const raw = val.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  const btn = document.getElementById(btnId);
  navigator.clipboard.writeText(raw).then(()=>flash(btn)).catch(()=>{
    const t=document.createElement('textarea');
    t.value=raw; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); flash(btn);
  });
}
function flash(btn){ if(!btn)return; btn.textContent='Copied!'; btn.classList.add('ok'); setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},1500) }

function addPerson(){ S.draft={}; S.draftVehicles=[]; S.modal='person'; render() }
function editPerson(id){ const p=people.find(x=>x.id===id); S.draft={...p}; S.draftVehicles=(p.vehicles||[]).map(v=>({...v})); S.modal='person'; render() }
function savePerson(){
  const d=S.draft;
  if(!d.name||!d.apt){ alert('Name and Apartment are required.'); return }
  const person={id:d.id||uid(),name:d.name,apt:d.apt,email:d.email||'',phone:d.phone||'',vehicles:S.draftVehicles};
  const idx=people.findIndex(p=>p.id===person.id);
  if(idx>=0) people[idx]=person; else people.push(person);
  save(); S.modal=null; render();
}
function delPerson(id){
  if(!confirm('Delete this person and all their vehicles?')) return;
  people=people.filter(p=>p.id!==id);
  if(S.sel.pid===id){S.sel.pid=null;S.sel.vid=null}
  save(); S.modal=null; render();
}

function addVeh(){ S.draftVeh={state:'CA'}; S.vehIdx=-1; S.modal='vehicle'; render() }
function editVeh(i){ S.draftVeh={...S.draftVehicles[i]}; S.vehIdx=i; S.modal='vehicle'; render() }
function cancelVeh(){ S.modal='person'; render() }
function saveVeh(){
  const v=S.draftVeh;
  if(!v.make||!v.plate){ alert('Make and License Plate are required.'); return }
  v.id=v.id||uid();
  if(!v.state) v.state='CA';
  if(S.vehIdx===-1) S.draftVehicles.push(v);
  else S.draftVehicles[S.vehIdx]=v;
  S.modal='person'; render();
}
function delVeh(i){
  if(!confirm('Delete this vehicle?')) return;
  S.draftVehicles.splice(i,1);
  S.modal='person'; render();
}

function editComplex(id){ const c=complexes.find(x=>x.id===id); S.draft={...c}; S.modal='complex'; render() }
function saveComplex(){
  const d=S.draft; if(!d.name) return;
  const idx=complexes.findIndex(c=>c.id===d.id);
  if(idx>=0) complexes[idx]={...d};
  save(); S.modal=null; render();
}
