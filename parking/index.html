---
layout: none
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Park Register">
<link rel="manifest" href="manifest.json">
<title>Park Register</title>
<style>
:root{
  --blue:#007AFF;--red:#FF3B30;--green:#34C759;--orange:#FF9500;
  --bg:#F2F2F7;--card:#fff;--label:#000;--secondary:rgba(60,60,67,.6);
  --tertiary:rgba(60,60,67,.3);--sep:rgba(60,60,67,.29);--tab-bg:rgba(249,249,249,.94);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--card:#1C1C1E;--label:#fff;--secondary:rgba(235,235,245,.6);
    --tertiary:rgba(235,235,245,.3);--sep:rgba(84,84,88,.65);--tab-bg:rgba(28,28,30,.94)}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--label)}
#app{display:flex;flex-direction:column;height:100%}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sb)+60px)}

.tabs{background:var(--tab-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:.5px solid var(--sep);padding:6px 0 calc(var(--sb)+2px);display:flex;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--secondary);padding:2px 0;font-family:inherit}
.tab.on{color:var(--blue)}
.tab svg{width:24px;height:24px}
.tab span{font-size:10px;font-weight:500}

.nav{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--st)+16px) 16px 8px}
.nav-title{font-size:34px;font-weight:700}
.nav-btn{background:none;border:none;color:var(--blue);font-size:17px;padding:8px;cursor:pointer;font-family:inherit;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.nav-sub{font-size:15px;color:var(--secondary);padding:0 16px 12px}

.sec{margin:20px 0 0}
.sec-hdr{font-size:13px;color:var(--secondary);text-transform:uppercase;letter-spacing:.04em;padding:0 16px 6px}
.card{background:var(--card);border-radius:12px;margin:0 16px;overflow:hidden}
.row{display:flex;align-items:center;padding:12px 16px;min-height:44px;border-bottom:.5px solid var(--sep);background:none;width:100%;text-align:left;color:var(--label);cursor:pointer;font-family:inherit}
.row:last-child{border-bottom:none}
.row.sel{background:rgba(0,122,255,.08)}
.rb{flex:1;min-width:0}
.rt{font-size:17px}
.rs{font-size:14px;color:var(--secondary);margin-top:1px}
.rc{font-size:13px;color:var(--tertiary);margin-top:1px}
.chk{color:var(--blue);margin-right:10px;flex-shrink:0}
.chv{color:var(--tertiary);flex-shrink:0;margin-left:8px}

.btn{display:block;width:calc(100% - 32px);margin:16px;padding:15px;border-radius:12px;border:none;font-size:17px;font-weight:600;cursor:pointer;background:var(--blue);color:#fff;font-family:inherit}
.btn:disabled{opacity:.35}
.btn.red{background:var(--red)}
.btn.green{background:var(--green)}

.ff{display:flex;align-items:center;padding:11px 16px;border-bottom:.5px solid var(--sep);min-height:44px;gap:8px}
.ff:last-child{border-bottom:none}
.ff label{font-size:17px;width:110px;flex-shrink:0}
.ff input,.ff select{flex:1;font-size:17px;border:none;outline:none;background:transparent;color:var(--label);font-family:inherit;min-width:0}
.ff input::placeholder{color:var(--tertiary)}
.ff select{-webkit-appearance:none}
.ff.col{flex-direction:column;align-items:stretch;gap:6px}
.ff.col label{width:auto}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;animation:fi .2s ease}
.sheet{background:var(--bg);border-radius:16px 16px 0 0;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sb)+8px);animation:su .28s ease}
.handle{width:36px;height:5px;background:var(--sep);border-radius:3px;margin:10px auto 0}
.mnav{display:flex;align-items:center;justify-content:space-between;padding:8px 8px 10px}
.mnav .ttl{font-size:17px;font-weight:600}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

.af-step{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--sep)}
.af-step:last-child{border-bottom:none}
.af-num{width:28px;height:28px;border-radius:14px;background:var(--blue);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.af-body{flex:1;font-size:15px;line-height:1.5}
.af-body strong{font-weight:600}
.af-body a{color:var(--blue);text-decoration:none;font-weight:600}

.info{margin:12px 16px;padding:12px;background:rgba(0,122,255,.1);border-radius:10px;font-size:14px;color:var(--secondary);line-height:1.5}
.info.ok{background:rgba(52,199,89,.12);color:var(--green)}
.info.warn{background:rgba(255,59,48,.1);color:var(--red)}

.empty{text-align:center;padding:52px 16px;color:var(--secondary)}
.empty-ico{font-size:52px;margin-bottom:12px}
.empty h3{font-size:20px;font-weight:600;color:var(--label);margin-bottom:6px}

.car-icon{width:38px;height:38px;border-radius:10px;background:rgba(0,122,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:12px}
.car-icon svg{width:22px;height:22px;color:var(--blue)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
const S={tab:'reg',modal:null,sel:{cid:null,carid:null},draft:{},draftCar:{}};

// ── Data ───────────────────────────────────────────────────────────────────────
let complexes=load('complexes2')||[
  {id:uid(),name:'Luca',addr:'',apt:'4060',url:'https://www.register2park.com/',code:''},
  {id:uid(),name:'Callista Hill Country',addr:'',apt:'728',url:'https://www.register2park.com/',code:''},
  {id:uid(),name:'Complex 3',addr:'',apt:'',url:'https://www.register2park.com/',code:''},
];
let cars=load('cars')||[];

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function saveAll(){ls('complexes2',complexes);ls('cars',cars)}
function ls(k,v){localStorage.setItem(k,JSON.stringify(v))}
function load(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function selC(){return complexes.find(c=>c.id===S.sel.cid)}
function selCar(){return cars.find(c=>c.id===S.sel.carid)}

// ── Fill script ────────────────────────────────────────────────────────────────
function buildScript(cx,car){
  const d={
    apt:cx.apt||'',phone:'',email:'',
    make:car.make||'',model:car.model||'',year:car.year||'',
    color:car.color||'',plate:car.plate||'',state:car.state||'',
    label:car.label||'',code:cx.code||''
  };
  const js=`(function(){
var d=${JSON.stringify(d)};
function nv(el,v){if(!el)return;try{var s=Object.getOwnPropertyDescriptor(HTMLInputElement.prototype,'value');if(s&&s.set)s.set.call(el,v);}catch(e){}el.value=v;['input','change','blur'].forEach(function(t){el.dispatchEvent(new Event(t,{bubbles:true}));});}
function ns(el,v){if(!el)return;var o=Array.from(el.options).find(function(o){return o.value.toLowerCase()===v.toLowerCase()||o.text.toLowerCase()===v.toLowerCase()||o.text.toLowerCase().startsWith(v.toLowerCase());});if(o)el.value=o.value;['change','blur'].forEach(function(t){el.dispatchEvent(new Event(t,{bubbles:true}));});}
function q(ss,v,sel){for(var i=0;i<ss.length;i++){var el=document.querySelector(ss[i]);if(el){sel?ns(el,v):nv(el,v);return;}}}
q(['input[name="unit"]','input[name="unit_number"]','input[name="apartment"]','input[name="apt"]','input[id*="unit" i]','input[placeholder*="unit" i]','input[placeholder*="apt" i]'],d.apt);
q(['input[name="make"]','input[id*="make" i]','input[placeholder*="make" i]'],d.make);
q(['input[name="model"]','input[id*="model" i]','input[placeholder*="model" i]'],d.model);
q(['input[name="year"]','input[id*="year" i]','input[placeholder*="year" i]'],d.year);
q(['input[name="color"]','input[id*="color" i]','input[placeholder*="color" i]'],d.color);
q(['input[name="plate"]','input[name="license_plate"]','input[name="license"]','input[id*="plate" i]','input[placeholder*="plate" i]','input[placeholder*="license" i]'],d.plate);
q(['select[name*="state" i]','select[id*="state" i]'],d.state,true);
q(['input[name*="state" i]','input[id*="state" i]'],d.state);
if(d.code)q(['input[name*="code" i]','input[name*="property" i]','input[id*="code" i]'],d.code);
document.querySelectorAll('label').forEach(function(lbl){
  var t=lbl.textContent.toLowerCase().trim();
  var el=lbl.control||document.getElementById(lbl.htmlFor)||lbl.nextElementSibling;
  if(!el)return;
  if(/unit|apt|apartment/.test(t))nv(el,d.apt);
  else if(/make/.test(t))nv(el,d.make);
  else if(/model/.test(t))nv(el,d.model);
  else if(/year/.test(t))nv(el,d.year);
  else if(/color/.test(t))nv(el,d.color);
  else if(/plate|license/.test(t))nv(el,d.plate);
  else if(/state/.test(t)&&el.tagName==='SELECT')ns(el,d.state);
});
alert('Form filled! Review and submit.');
})();`;
  return 'javascript:'+encodeURIComponent(js);
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render(){
  let h=`<div class="scr">`;
  if(S.tab==='reg') h+=viewReg();
  else if(S.tab==='cars') h+=viewCars();
  else h+=viewComplexes();
  h+=`</div><div class="tabs">${renderTabs()}</div>`;
  if(S.modal==='car') h+=modalCar();
  else if(S.modal==='complex') h+=modalComplex();
  else if(S.modal==='autofill') h+=modalAutoFill();
  document.getElementById('app').innerHTML=h;
}

function renderTabs(){
  return [
    {id:'reg',lbl:'Register',ico:iCar()},
    {id:'cars',lbl:'Visitor Cars',ico:iCars()},
    {id:'complexes',lbl:'Complexes',ico:iBuilding()},
  ].map(t=>`<button class="tab ${S.tab===t.id?'on':''}" onclick="setTab('${t.id}')">${t.ico}<span>${t.lbl}</span></button>`).join('');
}

// ── Register view ──────────────────────────────────────────────────────────────
function viewReg(){
  const cx=selC(), car=selCar(), canGo=cx&&car;
  return `
  <div class="nav"><span class="nav-title">Register</span></div>
  <p class="nav-sub">Select a complex and the visitor's car</p>

  <div class="sec"><div class="sec-hdr">Your Complex</div><div class="card">
    ${complexes.map(c=>`
    <button class="row ${S.sel.cid===c.id?'sel':''}" onclick="pickC('${c.id}')">
      ${S.sel.cid===c.id?`<span class="chk">${iCheck()}</span>`:''}
      <div class="rb">
        <div class="rt">${esc(c.name)}</div>
        ${c.apt?`<div class="rs">Apt <strong>${esc(c.apt)}</strong></div>`:`<div class="rs" style="color:var(--red)">Apt # not set</div>`}
      </div>
    </button>`).join('')}
  </div></div>

  <div class="sec"><div class="sec-hdr">Visitor's Car</div>
  ${cars.length===0?`
  <div class="card"><div class="row" style="color:var(--secondary);font-size:15px;cursor:default">
    <div class="rb">No cars saved yet — add them in Visitor Cars tab</div>
  </div></div>
  <button class="btn" style="margin-top:8px" onclick="quickAddCar()">+ Add Visitor Car Now</button>`
  :`<div class="card">
    ${cars.map(c=>`
    <button class="row ${S.sel.carid===c.id?'sel':''}" onclick="pickCar('${c.id}')">
      ${S.sel.carid===c.id?`<span class="chk">${iCheck()}</span>`:''}
      <div class="car-icon">${iCarSmall()}</div>
      <div class="rb">
        <div class="rt">${esc(c.label||[c.year,c.make,c.model].filter(Boolean).join(' '))}</div>
        <div class="rs">${esc(c.plate)}${c.state?' · '+esc(c.state):''}${c.color?' · '+esc(c.color):''}</div>
      </div>
    </button>`).join('')}
    <button class="row" style="color:var(--blue)" onclick="quickAddCar()">
      <div class="rb"><div class="rt">+ Add Another Car</div></div>
    </button>
  </div>`}

  ${canGo?`<div class="info ok" style="margin-top:16px">
    Ready: <strong>${esc(cx.name)}</strong> Apt ${esc(cx.apt)} · <strong>${esc(car.year)} ${esc(car.make)} ${esc(car.model)}</strong> · ${esc(car.plate)}
  </div>`:''}
  </div>

  <button class="btn ${canGo?'green':''}" ${canGo?'':'disabled'} onclick="doRegister()" style="margin-top:${cars.length?'16px':'0'}">
    🚗 Auto-Fill Registration Form
  </button>`;
}

// ── Cars view ──────────────────────────────────────────────────────────────────
function viewCars(){
  return `
  <div class="nav">
    <span class="nav-title">Visitor Cars</span>
    <button class="nav-btn" onclick="addCar()">${iPlus()}</button>
  </div>
  <p class="nav-sub">Save regular visitors' cars for quick re-registration</p>
  ${cars.length===0?`<div class="empty"><div class="empty-ico">🚗</div><h3>No Cars Yet</h3><p>Tap + to add a visitor's car</p></div>`:`
  <div class="card" style="margin:0 16px">
    ${cars.map(c=>`
    <button class="row" onclick="editCar('${c.id}')">
      <div class="car-icon">${iCarSmall()}</div>
      <div class="rb">
        <div class="rt">${esc(c.label||[c.year,c.make,c.model].filter(Boolean).join(' '))}</div>
        <div class="rs">${esc(c.plate)}${c.state?' · '+esc(c.state):''}${c.year?' · '+esc(c.year):''}</div>
        ${c.color?`<div class="rc">${esc(c.color)}</div>`:''}
      </div>
      <span class="chv">${iChev()}</span>
    </button>`).join('')}
  </div>`}`;
}

// ── Complexes view ─────────────────────────────────────────────────────────────
function viewComplexes(){
  return `
  <div class="nav"><span class="nav-title">Complexes</span></div>
  <p class="nav-sub">Set your apartment number and register2park.com URL for each</p>
  <div class="card" style="margin:0 16px">
    ${complexes.map(c=>`
    <button class="row" onclick="editComplex('${c.id}')">
      <div class="rb">
        <div class="rt">${esc(c.name)}</div>
        ${c.apt?`<div class="rs">Apt <strong>${esc(c.apt)}</strong></div>`:`<div class="rs" style="color:var(--red)">⚠ Set your apartment number</div>`}
        ${c.url&&c.url!=='https://www.register2park.com/'
          ?`<div class="rc">${esc(c.url)}</div>`
          :`<div class="rc" style="color:var(--orange)">⚠ Register2Park URL not configured</div>`}
      </div>
      <span class="chv">${iChev()}</span>
    </button>`).join('')}
  </div>
  <div class="info">💡 To find the URL: open register2park.com in Safari → select your complex → copy the page URL → paste here.</div>`;
}

// ── Auto-fill modal ────────────────────────────────────────────────────────────
function modalAutoFill(){
  const cx=selC(), car=selCar();
  const url=cx.url||'https://www.register2park.com/';
  const script=buildScript(cx,car);
  return `
  <div class="overlay">
    <div class="sheet">
      <div class="handle"></div>
      <div class="mnav">
        <button class="nav-btn" onclick="closeModal()">Done</button>
        <span class="ttl">Auto-Fill</span>
        <span style="min-width:60px"></span>
      </div>
      <div class="info ok" style="margin-top:0;font-size:15px;font-weight:500">✅ Fill script copied to clipboard!</div>
      <div class="card" style="margin-bottom:0">
        <div class="af-step">
          <div class="af-num">1</div>
          <div class="af-body">
            <a href="${esc(url)}" target="_blank">Open register2park.com →</a><br>
            <span style="font-size:13px;color:var(--secondary)">Tap to open the form in a new tab</span>
          </div>
        </div>
        <div class="af-step">
          <div class="af-num">2</div>
          <div class="af-body">Tap the <strong>address bar</strong> in Safari</div>
        </div>
        <div class="af-step">
          <div class="af-num">3</div>
          <div class="af-body"><strong>Select All</strong> the text, then tap <strong>Paste</strong></div>
        </div>
        <div class="af-step">
          <div class="af-num">4</div>
          <div class="af-body">Tap <strong>Go</strong> — all fields fill automatically ✨</div>
        </div>
      </div>
      <div class="info" style="margin-top:12px">
        <strong>Filling:</strong> Apt ${esc(cx.apt)} · ${esc(car.year)} ${esc(car.make)} ${esc(car.model)} · Plate ${esc(car.plate)} (${esc(car.state)})
      </div>
      <button class="btn" id="rbtn" onclick="reCopy()">📋 Copy Script Again</button>
      <div style="height:8px"></div>
    </div>
  </div>`;
}

// ── Car modal ──────────────────────────────────────────────────────────────────
const STATES=['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC'];

function modalCar(){
  const d=S.draftCar, isNew=!d.id;
  return `
  <div class="overlay">
    <div class="sheet">
      <div class="handle"></div>
      <div class="mnav">
        <button class="nav-btn" onclick="closeModal()">Cancel</button>
        <span class="ttl">${isNew?'Add Visitor Car':'Edit Car'}</span>
        <button class="nav-btn" style="font-weight:600" onclick="saveCar()">Save</button>
      </div>
      <div class="sec-hdr">Owner</div>
      <div class="card">
        <div class="ff"><label>Name / Label</label><input placeholder='e.g. "Mom" or "John"' value="${esc(d.label||'')}" oninput="S.draftCar.label=this.value"></div>
      </div>
      <div class="sec-hdr" style="margin-top:20px">Car</div>
      <div class="card">
        <div class="ff"><label>Make</label><input placeholder="Toyota" value="${esc(d.make||'')}" oninput="S.draftCar.make=this.value"></div>
        <div class="ff"><label>Model</label><input placeholder="Camry" value="${esc(d.model||'')}" oninput="S.draftCar.model=this.value"></div>
        <div class="ff"><label>Year</label><input placeholder="2022" inputmode="numeric" value="${esc(d.year||'')}" oninput="S.draftCar.year=this.value"></div>
        <div class="ff"><label>Color</label><input placeholder="Silver" value="${esc(d.color||'')}" oninput="S.draftCar.color=this.value"></div>
      </div>
      <div class="sec-hdr" style="margin-top:20px">License Plate</div>
      <div class="card">
        <div class="ff"><label>Plate #</label><input placeholder="ABC1234" autocapitalize="characters" value="${esc(d.plate||'')}" oninput="S.draftCar.plate=this.value.toUpperCase()"></div>
        <div class="ff"><label>State</label>
          <select onchange="S.draftCar.state=this.value">
            ${STATES.map(s=>`<option value="${s}"${(d.state||'TX')===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      ${!isNew?`<button class="btn red" style="margin-top:24px" onclick="deleteCar('${d.id}')">Delete Car</button>`:''}
      <div style="height:20px"></div>
    </div>
  </div>`;
}

// ── Complex modal ──────────────────────────────────────────────────────────────
function modalComplex(){
  const d=S.draft;
  return `
  <div class="overlay">
    <div class="sheet">
      <div class="handle"></div>
      <div class="mnav">
        <button class="nav-btn" onclick="closeModal()">Cancel</button>
        <span class="ttl">Edit Complex</span>
        <button class="nav-btn" style="font-weight:600" onclick="saveComplex()">Save</button>
      </div>
      <div class="sec-hdr">Info</div>
      <div class="card">
        <div class="ff"><label>Name</label><input placeholder="Complex Name" value="${esc(d.name||'')}" oninput="S.draft.name=this.value"></div>
        <div class="ff"><label>Your Apt #</label><input placeholder="e.g. 4060" inputmode="numeric" value="${esc(d.apt||'')}" oninput="S.draft.apt=this.value"></div>
        <div class="ff"><label>Address</label><input placeholder="123 Main St" value="${esc(d.addr||'')}" oninput="S.draft.addr=this.value"></div>
      </div>
      <div class="sec-hdr" style="margin-top:20px">Register2Park</div>
      <div class="card">
        <div class="ff col">
          <label>Registration URL</label>
          <input type="url" autocapitalize="none" autocorrect="off" spellcheck="false"
            placeholder="https://www.register2park.com/..."
            value="${esc(d.url||'')}" oninput="S.draft.url=this.value">
        </div>
        <div class="ff"><label>Property Code</label><input placeholder="Optional" autocapitalize="none" value="${esc(d.code||'')}" oninput="S.draft.code=this.value"></div>
      </div>
      <div class="info">Open register2park.com → navigate to your complex's registration page → copy the full URL from the address bar and paste above.</div>
    </div>
  </div>`;
}

// ── Actions ────────────────────────────────────────────────────────────────────
function setTab(t){S.tab=t;render()}
function pickC(id){S.sel.cid=id;render()}
function pickCar(id){S.sel.carid=id;render()}
function closeModal(){S.modal=null;render()}

function doRegister(){
  const cx=selC(), car=selCar(); if(!cx||!car)return;
  const script=buildScript(cx,car);
  copyText(script).finally(()=>{S.modal='autofill';render()});
}

function reCopy(){
  const cx=selC(), car=selCar(); if(!cx||!car)return;
  copyText(buildScript(cx,car)).then(()=>{
    const b=document.getElementById('rbtn');
    if(b){b.textContent='✅ Copied!';setTimeout(()=>b.textContent='📋 Copy Script Again',2000);}
  });
}

function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText) return navigator.clipboard.writeText(t);
  return new Promise((res,rej)=>{
    const el=document.createElement('textarea');
    el.value=t;el.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(el);el.focus();el.select();
    try{document.execCommand('copy')?res():rej();}catch(e){rej(e);}
    document.body.removeChild(el);
  });
}

function addCar(){S.draftCar={state:'TX'};S.modal='car';render()}
function quickAddCar(){S.draftCar={state:'TX'};S.modal='car';render()}
function editCar(id){const c=cars.find(x=>x.id===id);S.draftCar={...c};S.modal='car';render()}
function saveCar(){
  const d=S.draftCar;
  if(!d.make&&!d.plate){alert('Enter at least a plate number or car make.');return}
  d.id=d.id||uid();
  const idx=cars.findIndex(c=>c.id===d.id);
  if(idx>=0)cars[idx]={...d};else cars.push({...d});
  saveAll();S.modal=null;render();
}
function deleteCar(id){
  if(!confirm('Delete this car?'))return;
  cars=cars.filter(c=>c.id!==id);
  if(S.sel.carid===id)S.sel.carid=null;
  saveAll();S.modal=null;render();
}

function editComplex(id){const c=complexes.find(x=>x.id===id);S.draft={...c};S.modal='complex';render()}
function saveComplex(){
  const d=S.draft;if(!d.name)return;
  const idx=complexes.findIndex(c=>c.id===d.id);
  if(idx>=0)complexes[idx]={...d};
  saveAll();S.modal=null;render();
}
